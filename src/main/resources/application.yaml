server:
  port: 8082
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    session:
      timeout: 30m
azure:
  entra-id:
    client-id: ${AUTH_CLIENT_ID}
    client-secret: ${AUTH_CLIENT_SECRET}
    cloud-instance: ${AUTH_CLOUD_INSTANCE}
    scope: ${AUTH_SCOPE}
    tenant-id: ${AUTH_TENANT_ID}

sds-api:
  url: ${SDS_API_URL}

spring:
  security:
    saml2:
      relyingparty:
        registration:
          entra-id:
            entity-id: ${AUTH_SAML_ENTITY_ID}
            assertingparty:
              entity-id: https://sts.windows.net/${AUTH_TENANT_ID}/
              metadata-uri: ${AUTH_CLOUD_INSTANCE}/${AUTH_TENANT_ID}/federationmetadata/2007-06/federationmetadata.xml?appid=${SSO_APP_ID}
              singlesignon:
                url: ${AUTH_CLOUD_INSTANCE}/${AUTH_TENANT_ID}/saml2
              verification:
                credentials:
                  - certificate-location: classpath:certs/submissiondev.cer